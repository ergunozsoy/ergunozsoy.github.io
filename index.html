<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAMA · Ergün Özsoy</title>
<meta name="description" content="YAMA — Ergün Özsoy's personal fleet of small apps. Don't panic.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,500&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#080c17;
    --void-2:#0c1322;
    --panel:#111a2e;
    --panel-2:#0e1626;
    --line:rgba(122,160,205,.18);
    --line-2:rgba(122,160,205,.32);
    --guide:#62e39c;
    --guide-dim:rgba(98,227,156,.55);
    --amber:#f0b65e;
    --ink:#e3eaf6;
    --ink-soft:#93a3bd;
    --ink-dim:#6a7991;
    /* peştemal */
    --t1:#d2674a; --t2:#ecdcb8; --t3:#3a5685; --t4:#cf8f7a; --t5:#e6c98f;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{
    margin:0;background:var(--void);color:var(--ink);
    font-family:"Space Grotesk",system-ui,sans-serif;line-height:1.55;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  /* starfield */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1.5px 1.5px at 18% 22%,#fff,transparent),
      radial-gradient(1px 1px at 72% 14%,#cfe0ff,transparent),
      radial-gradient(1.3px 1.3px at 40% 70%,#fff,transparent),
      radial-gradient(1px 1px at 88% 60%,#bcd2ff,transparent),
      radial-gradient(1px 1px at 60% 38%,#fff,transparent),
      radial-gradient(1.4px 1.4px at 12% 82%,#fff,transparent),
      radial-gradient(1px 1px at 30% 12%,#dce9ff,transparent),
      radial-gradient(900px 600px at 78% -8%,rgba(58,86,133,.30),transparent),
      radial-gradient(700px 500px at 8% 108%,rgba(210,103,74,.12),transparent);
    background-repeat:no-repeat;
    animation:tw 7s ease-in-out infinite alternate;
  }
  @keyframes tw{from{opacity:.78}to{opacity:1}}
  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:20px 20px 70px}

  /* ---------- top bar ---------- */
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:6px 0 4px}
  .mark{display:flex;align-items:center;gap:11px}
  .badge{
    width:40px;height:40px;border:1.5px solid var(--line-2);border-radius:11px;flex:none;
    display:grid;place-items:center;background:var(--panel-2);
    font-family:"Space Mono",monospace;font-weight:700;color:var(--guide);font-size:18px;
    box-shadow:inset 0 0 18px rgba(98,227,156,.12);
  }
  .mark b{font-family:"Space Grotesk";font-weight:700;font-size:17px;letter-spacing:.22em}
  .mark span{display:block;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--ink-soft);letter-spacing:.02em}
  .top-right{display:flex;align-items:center;gap:10px}
  .langs{display:flex;border:1.5px solid var(--line-2);border-radius:999px;overflow:hidden;font-family:"Space Mono",monospace}
  .langs button{background:transparent;border:0;padding:7px 12px;font:inherit;font-size:11.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;letter-spacing:.06em}
  .langs button.on{background:var(--guide);color:#06231a}
  .panic{
    font-family:"Space Mono",monospace;font-weight:700;font-size:11.5px;letter-spacing:.12em;
    background:transparent;border:1.5px solid var(--guide);color:var(--guide);
    border-radius:999px;padding:7px 14px;cursor:pointer;white-space:nowrap;
    transition:background .14s,color .14s;
  }
  .panic:hover{background:var(--guide);color:#06231a}

  /* ---------- cockpit hero ---------- */
  .cockpit{
    position:relative;margin:22px 0 34px;border:2px solid var(--line-2);border-radius:24px;
    background:linear-gradient(180deg,#0a1120,#0b1426);
    box-shadow:0 30px 70px -40px #000, inset 0 0 60px rgba(8,12,23,.7);
    overflow:hidden;
  }
  .view{
    position:relative;min-height:330px;padding:40px 34px 30px;
    background:
      radial-gradient(120px 120px at 86% 118%,#274068 0 40%,#1a2c4d 41%,transparent 72%),
      radial-gradient(2px 2px at 24% 30%,#fff,transparent),
      radial-gradient(1.5px 1.5px at 64% 24%,#cfe0ff,transparent),
      radial-gradient(1.5px 1.5px at 46% 56%,#fff,transparent),
      radial-gradient(900px 360px at 50% -30%,rgba(98,227,156,.10),transparent);
    background-repeat:no-repeat;
  }
  .scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 2px,transparent 2px 4px);mix-blend-mode:overlay}
  .eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.16em;color:var(--guide);margin:0 0 14px}
  .eyebrow .blink{animation:blink 1.1s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  h1{
    font-family:"Space Grotesk";font-weight:700;font-size:clamp(64px,17vw,150px);line-height:.84;
    letter-spacing:.04em;margin:0;color:var(--ink);
    text-shadow:0 0 36px rgba(98,227,156,.18);
  }
  .sub{font-family:"Fraunces",serif;font-style:italic;font-weight:500;font-size:clamp(16px,2.6vw,21px);color:var(--ink);max-width:30ch;margin:16px 0 0}
  .who{font-family:"Space Mono",monospace;font-size:11.5px;letter-spacing:.04em;color:var(--ink-soft);margin:9px 0 0}

  /* guide screen */
  .guide{
    margin-top:22px;display:inline-flex;flex-direction:column;gap:8px;
    border:1.5px solid var(--guide-dim);border-radius:12px;padding:12px 15px;max-width:520px;
    background:rgba(8,20,16,.55);box-shadow:inset 0 0 22px rgba(98,227,156,.08);
  }
  .guide .boot{font-family:"Space Mono",monospace;font-size:12.5px;color:var(--guide);white-space:nowrap;overflow:hidden}
  .dontpanic{font-family:"Space Grotesk";font-weight:700;letter-spacing:.16em;color:var(--guide);font-size:clamp(18px,4vw,26px)}

  /* peştemal hanging from the airlock door */
  .door{position:absolute;top:-2px;right:34px;width:74px;height:100%;border-left:2px solid var(--line-2);border-right:2px solid var(--line-2);background:linear-gradient(90deg,rgba(255,255,255,.03),transparent);}
  @media(max-width:560px){.door{right:14px;width:54px}}
  .towel{
    position:absolute;top:-12px;right:42px;width:58px;height:190px;border-radius:4px 4px 2px 2px;
    transform-origin:top center;cursor:pointer;z-index:3;
    background:repeating-linear-gradient(180deg,
      var(--t1) 0 13px, var(--t2) 13px 18px, var(--t3) 18px 30px, var(--t2) 30px 35px,
      var(--t4) 35px 47px, var(--t5) 47px 52px, var(--t1) 52px 64px, var(--t2) 64px 69px);
    box-shadow:-6px 4px 16px rgba(0,0,0,.45), inset -8px 0 14px rgba(0,0,0,.22), inset 6px 0 10px rgba(255,255,255,.10);
    animation:sway 5.5s ease-in-out infinite;
  }
  @media(max-width:560px){.towel{right:24px;width:44px;height:150px}}
  .towel::after{content:"";position:absolute;left:0;right:0;bottom:-11px;height:13px;
    background:repeating-linear-gradient(90deg,var(--t2) 0 3px,transparent 3px 7px)}
  .towel:hover{animation-play-state:paused}
  @keyframes sway{0%,100%{transform:rotate(-2.2deg)}50%{transform:rotate(2.2deg)}}
  .towel-tip{
    position:absolute;top:14px;right:108px;z-index:4;max-width:200px;
    font-family:"Space Mono",monospace;font-size:11px;color:var(--guide);
    background:rgba(8,20,16,.92);border:1px solid var(--guide-dim);border-radius:9px;padding:8px 11px;
    opacity:0;transform:translateY(-4px);transition:.2s;pointer-events:none;
  }
  .towel-tip.show{opacity:1;transform:none}

  /* ---------- console: search + filters ---------- */
  .console{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:0 0 26px}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:9px;background:var(--panel-2);border:1.5px solid var(--line);border-radius:11px;padding:10px 14px}
  .search svg{flex:none;opacity:.8}
  .search input{flex:1;background:transparent;border:0;color:var(--ink);font:inherit;font-size:14.5px}
  .search input:focus{outline:none}
  .search input::placeholder{color:var(--ink-dim)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-family:"Space Mono",monospace;font-size:11.5px;letter-spacing:.04em;background:var(--panel-2);border:1.5px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:8px 13px;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--line-2);color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--void);border-color:var(--ink)}

  /* ---------- decks ---------- */
  .deck{margin-bottom:34px}
  .deck.hide{display:none}
  .deck-head{display:flex;align-items:baseline;gap:12px;margin-bottom:15px;padding-bottom:9px;border-bottom:1.5px solid var(--line)}
  .deck-code{font-family:"Space Mono",monospace;font-size:11px;color:var(--guide);letter-spacing:.1em}
  .deck-name{font-family:"Space Mono",monospace;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}
  .deck-count{margin-left:auto;font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-dim)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
  .mod{
    position:relative;background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1.5px solid var(--line);border-radius:15px;padding:16px 17px 15px;
    display:flex;flex-direction:column;min-height:150px;transition:transform .12s,border-color .14s,box-shadow .14s;
  }
  .mod.hide{display:none}
  .mod:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:0 16px 34px -22px #000}
  .mod-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .call{font-family:"Space Mono",monospace;font-weight:700;font-size:11px;letter-spacing:.08em;color:var(--ink-soft);border:1.5px solid var(--line);border-radius:6px;padding:2px 7px}
  .auto-tag{font-family:"Space Mono",monospace;font-size:9px;letter-spacing:.1em;color:var(--guide);border:1px solid var(--guide-dim);border-radius:5px;padding:1px 5px;text-transform:uppercase}
  .stat{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.1em;color:var(--ink-dim)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--guide);box-shadow:0 0 0 0 var(--guide);animation:pulse 2.4s ease-out infinite}
  .dot.beta{background:var(--amber);animation:none;box-shadow:0 0 8px rgba(240,182,94,.6)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(98,227,156,.5)}70%{box-shadow:0 0 0 7px rgba(98,227,156,0)}100%{box-shadow:0 0 0 0 rgba(98,227,156,0)}}
  .mod h3{font-family:"Space Grotesk";font-weight:600;font-size:18px;margin:0 0 5px;letter-spacing:-.01em}
  .mod p{font-size:13.5px;color:var(--ink-soft);margin:0 0 14px;flex:1}
  .acts{display:flex;gap:9px}
  .btn{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.04em;text-decoration:none;padding:8px 13px;border-radius:9px;transition:.12s;display:inline-flex;align-items:center;gap:6px}
  .btn.go{background:var(--guide);color:#06231a}
  .btn.go:hover{filter:brightness(1.08)}
  .btn.code{background:transparent;border:1.5px solid var(--line-2);color:var(--ink-soft)}
  .btn.code:hover{color:var(--ink);border-color:var(--ink-soft)}

  .empty{text-align:center;color:var(--ink-dim);font-family:"Space Mono",monospace;font-size:13px;padding:30px 0;display:none}
  .empty.show{display:block}

  /* ---------- footer ---------- */
  footer{margin-top:46px;border-top:1.5px solid var(--line);padding-top:24px;color:var(--ink-soft);font-size:13px}
  .foot-row{display:flex;flex-wrap:wrap;gap:14px 26px;align-items:center}
  .motto{font-family:"Fraunces",serif;font-style:italic;font-size:15px;color:var(--ink)}
  .egg{font-family:"Space Mono",monospace;font-size:12px;color:var(--ink-soft);background:var(--panel-2);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;transition:.12s}
  .egg:hover{border-color:var(--guide-dim);color:var(--guide)}
  .foot-meta{margin-top:16px;font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-dim);letter-spacing:.03em;display:flex;flex-wrap:wrap;gap:5px 16px}
  footer a{color:var(--ink-soft)}

  /* ---------- modal (crew + eggs) ---------- */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(4,7,14,.74);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:22px}
  .scrim.show{display:flex;animation:fade .2s both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{max-width:440px;width:100%;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1.5px solid var(--line-2);border-radius:18px;padding:24px;box-shadow:0 40px 90px -40px #000;animation:pop .26s cubic-bezier(.2,.7,.2,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
  .modal .mtag{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.14em;color:var(--guide);text-transform:uppercase}
  .modal h4{font-family:"Fraunces",serif;font-weight:900;font-size:24px;margin:8px 0 12px}
  .modal p{font-size:14.5px;color:var(--ink-soft);margin:0 0 12px}
  .modal .crew{font-family:"Space Mono",monospace;font-size:13px;color:var(--ink);border-left:2px solid var(--guide-dim);padding:6px 0 6px 12px;margin:0 0 12px}
  .modal .close{margin-top:6px;background:var(--guide);color:#06231a;border:0;border-radius:9px;padding:9px 15px;font-family:"Space Mono",monospace;font-weight:700;font-size:12px;letter-spacing:.06em;cursor:pointer}

  /* DON'T PANIC flash */
  .flash{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(6,35,26,.92);pointer-events:none}
  .flash.show{display:flex;animation:flashout 1.6s ease-out forwards}
  .flash b{font-family:"Space Grotesk";font-weight:700;font-size:clamp(40px,12vw,120px);letter-spacing:.1em;color:var(--guide);text-align:center}
  @keyframes flashout{0%{opacity:0}12%{opacity:1}70%{opacity:1}100%{opacity:0}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;scroll-behavior:auto}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="mark">
      <div class="badge">Y</div>
      <div><b>YAMA</b><span data-i="who"></span></div>
    </div>
    <div class="top-right">
      <button class="panic" id="panicBtn">DON'T PANIC</button>
      <div class="langs" role="group" aria-label="Language">
        <button data-lang="tr">TR</button>
        <button data-lang="de">DE</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </div>

  <!-- COCKPIT -->
  <header class="cockpit">
    <div class="view">
      <div class="scan"></div>
      <p class="eyebrow"><span data-i="eyebrow"></span> <span class="blink">▌</span></p>
      <h1>YAMA</h1>
      <p class="sub" data-i="sub"></p>
      <p class="who" data-i="whoFull"></p>

      <div class="guide">
        <div class="boot" id="boot"></div>
        <div class="dontpanic">DON'T&nbsp;PANIC</div>
      </div>

      <div class="door"></div>
      <div class="towel" id="towel" title="" role="button" tabindex="0" aria-label="towel"></div>
      <div class="towel-tip" id="towelTip"></div>
    </div>
  </header>

  <!-- CONSOLE -->
  <div class="console">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#93a3bd" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" data-i-ph="searchPh" aria-label="search">
    </label>
    <div class="chips" id="chips"></div>
  </div>

  <main id="decks"></main>
  <p class="empty" id="empty" data-i="empty"></p>

  <footer>
    <div class="foot-row">
      <span class="motto">Simple by design. Powerful by evolution.</span>
      <span class="egg" id="egg42">42</span>
      <span class="egg" id="eggCrew" data-i="crewLink"></span>
    </div>
    <div class="foot-meta">
      <span>YAMA Project</span>
      <span>v1.0.0</span>
      <span data-i="asof"></span>
      <span>© 2026 Ergün Özsoy</span>
      <span><a href="mailto:e.ozsoy@gmail.com">e.ozsoy@gmail.com</a></span>
    </div>
  </footer>
</div>

<!-- modal -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="mtag" id="mTag"></div>
    <h4 id="mTitle"></h4>
    <div id="mBody"></div>
    <button class="close" id="mClose" data-i="close"></button>
  </div>
</div>

<div class="flash" id="flash"><b>DON'T PANIC</b></div>

<script>
/* =================================================================
   YAMA — the ship's computer / bordbilgisayar
   A small galactic base of Ergün Özsoy's apps. Don't panic.

   MODÜL EKLEME — iki yol:
   1) KÜRATÖRLÜ (önerilen, üç dilli): aşağıdaki MODULES dizisine bir
      satır ekle. Tam kontrol: tr/de/en açıklama, çağrı kodu, durum.
   2) OTOMATİK: GitHub'da repoya "yama" topic'i ver (veya adını
      "yama-" ile başlat). Sayfa açılınca kendiliğinden gelir.
      Deck için topic: sprache/musik/finanzen/… · çağrı kodu: cs-xxx
==================================================================*/
const OWNER="ergunozsoy";
const FLEET_TOPIC="yama";                       // otomatik keşif markası
const PAGES=s=>`https://${OWNER}.github.io/${s}/`;
const REPO =s=>`https://github.com/${OWNER}/${s}`;

/* edit here to add / rename / relink modules ----------------------*/
const MODULES=[
 {slug:"YAMA-Turkologie-Guide",  deck:"lang",   call:"TKG", status:"online", web:true,
  desc:{tr:"Türkoloji rehberi", de:"Leitfaden zur Turkologie", en:"A guide to Turcology"}},
 {slug:"YAMA-Turkce-Ders-Notlari",deck:"lang",  call:"TDN", status:"online", web:true,
  desc:{tr:"Türkçe ders notları (1–4)", de:"Türkisch-Kursnotizen (1–4)", en:"Turkish course notes (1–4)"}},
 {slug:"YAMA-DaZ-Sprachvergleich",deck:"lang",  call:"DAZ", status:"online", web:true,
  desc:{tr:"Almanca–Türkçe dil karşılaştırması (DaZ)", de:"Sprachvergleich Deutsch–Türkisch (DaZ)", en:"German–Turkish contrastive language (DaZ)"}},
 {slug:"YAMA-Deutsch",           deck:"lang",   call:"DEU", status:"online", web:true,
  desc:{tr:"Almanca öğrenme yardımcısı", de:"Deutsch-Lernhelfer", en:"German learning companion"}},

 {slug:"YAMA-Violin",            deck:"music",  call:"VLN", status:"online", web:true,
  desc:{tr:"Keman pratiği ve ısınma", de:"Geigen-Übung & Aufwärmen", en:"Violin practice & warm-ups"}},
 {slug:"YAMA-Nota",              deck:"music",  call:"NOT", status:"online", web:true,
  desc:{tr:"Nota okuma & müzik teorisi", de:"Notenlesen & Musiktheorie", en:"Sheet music & theory"}},
 {slug:"YAMA-Dance-Practice-Hub",deck:"music",  call:"DNC", status:"online", web:true,
  desc:{tr:"Dans figürleri ve ritim arşivi", de:"Tanzfiguren & Rhythmus-Archiv", en:"Dance steps & rhythm archive"}},

 {slug:"YAMA-Invest",           deck:"finance", call:"INV", status:"beta", web:true,
  desc:{tr:"Yatırım & portföy araçları", de:"Investment- & Portfolio-Tools", en:"Investing & portfolio tools"}},
 {slug:"YAMA-Invest-Android",   deck:"finance", call:"IVA", status:"beta", web:false,
  desc:{tr:"Yatırım araçları — Android", de:"Investment-Tools — Android", en:"Investing tools — Android"}},

 {slug:"YAMA-Human-Compass",    deck:"tools",  call:"HMC", status:"online", web:true,
  desc:{tr:"İnsan pusulası: değerler & yön", de:"Menschlicher Kompass: Werte & Richtung", en:"A human compass: values & direction"}},
 {slug:"YAMA-Stupidity-Checker",deck:"tools",  call:"STU", status:"online", web:true,
  desc:{tr:"Aptallık analizcisi (Cipolla)", de:"Dummheits-Analyse (Cipolla)", en:"Stupidity analyzer (Cipolla)"}},
 {slug:"YAMA-Time-Traveling-App",deck:"tools", call:"TTA", status:"beta", web:true,
  desc:{tr:"Zaman yolculuğu: tarih & takvim", de:"Zeitreise: Geschichte & Kalender", en:"Time travel: history & calendars"}},
 {slug:"YAMA-Flight-Assistant", deck:"tools",  call:"FLT", status:"online", web:true,
  desc:{tr:"Uçuş & yolculuk yardımcısı", de:"Flug- & Reisehelfer", en:"Flight & travel assistant"}},
 {slug:"YAMA-Lokman",           deck:"tools",  call:"LOK", status:"online", web:true,

let lang="tr", activeDeck="all", query="";
let EXTRA=[];                                    // GitHub'dan otomatik gelenler
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);

/* tüm modüller = küratörlü + otomatik keşfedilen */
function allMods(){return MODULES.concat(EXTRA);}

/* boot satırı, canlı modül sayısıyla */
function bootText(n){
  return ({tr:`> tüm sistemler hazır · ${n} modül bağlı`,
           de:`> alle Systeme bereit · ${n} Module verbunden`,
           en:`> all systems go · ${n} modules linked`})[lang];
}

function chrome(){
  const t=T[lang];
  document.documentElement.lang=lang;
  $$("[data-i]").forEach(el=>{const k=el.getAttribute("data-i");if(t[k]!=null)el.textContent=t[k];});
  $$("[data-i-ph]").forEach(el=>{const k=el.getAttribute("data-i-ph");if(t[k]!=null)el.placeholder=t[k];});
  $$(".langs button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  $("#boot").textContent=bootText(allMods().length);
  $("#towel").title=t.towel;
  // chips
  const chips=$("#chips"); chips.innerHTML="";
  const mk=(id,label)=>{const c=document.createElement("button");c.className="chip"+(activeDeck===id?" on":"");c.textContent=label;c.onclick=()=>{activeDeck=id;chrome();renderDecks();};return c;};
  chips.appendChild(mk("all",t.all));
  DECKS.forEach(d=>chips.appendChild(mk(d,t.decks[d][1])));
}

function card(m){
  const t=T[lang];
  const target=m.url||PAGES(m.slug);
  const live=m.web?`<a class="btn go" href="${target}" target="_blank" rel="noopener">▶ ${t.go}</a>`:"";
  const st=m.status==="beta"?t.beta:t.online;
  const autoTag=m._auto?`<span class="auto-tag" title="GitHub'dan otomatik">auto</span>`:"";
  return `<article class="mod" data-deck="${m.deck}" data-text="${(m.slug+' '+m.call+' '+(m.desc[lang]||'')).toLowerCase()}">
    <div class="mod-top">
      <span class="call">${m.call}</span>
      ${autoTag}
      <span class="stat"><span class="dot ${m.status==='beta'?'beta':''}"></span>${st}</span>
    </div>
    <h3>${m.slug.replace(/^yama[-_]?/i,'').replace(/-/g,' ')}</h3>
    <p>${m.desc[lang]||""}</p>
    <div class="acts">
      ${live}
      <a class="btn code" href="${REPO(m.slug)}" target="_blank" rel="noopener">&lt;/&gt; ${t.code}</a>
    </div>
  </article>`;
}

function renderDecks(){
  const t=T[lang], host=$("#decks"); host.innerHTML="";
  let totalVisible=0;
  DECKS.forEach(d=>{
    const mods=allMods().filter(m=>m.deck===d);
    const sec=document.createElement("section"); sec.className="deck"; sec.dataset.deck=d;
    sec.innerHTML=`<div class="deck-head">
        <span class="deck-code">${t.decks[d][0]}</span>
        <span class="deck-name">${t.decks[d][1]}</span>
        <span class="deck-count">${mods.length}</span>
      </div><div class="grid">${mods.map(card).join("")}</div>`;
    host.appendChild(sec);
  });
  // apply filter + search
  $$(".deck").forEach(sec=>{
    let vis=0;
    sec.querySelectorAll(".mod").forEach(m=>{
      const okDeck = activeDeck==="all" || m.dataset.deck===activeDeck;
      const okText = !query || m.dataset.text.includes(query);
      const show = okDeck && okText;
      m.classList.toggle("hide",!show);
      if(show)vis++;
    });
    sec.classList.toggle("hide",vis===0);
    totalVisible+=vis;
  });
  $("#empty").classList.toggle("show",totalVisible===0);
}

/* =================================================================
   OTOMATİK KEŞİF — yeni repolar gemiye kendiliğinden dokulanır.
   Küratörlü 14 modül her zaman görünür; bu sadece DİZİDE OLMAYAN,
   "yama" etiketli (ya da adı "yama-" ile başlayan) repoları ekler.
   GitHub'a ulaşılamazsa sessizce geçer — sayfa asla boşalmaz.
==================================================================*/
function deckFromTopics(topics){
  const map={
    lang:   ["sprache","turkologie","turkoloji","daz","deutsch","tuerkisch","linguistik"],
    music:  ["musik","music","bewegung","tanz","dance","violin","nota","geige"],
    finance:["finanzen","finance","invest","boerse","geld"]
  };
  const forced=topics.find(x=>/^deck-[a-d]$/.test(x));
  if(forced) return ({a:"lang",b:"music",c:"finance",d:"tools"})[forced.slice(5)];
  for(const d of ["lang","music","finance"]) if(map[d].some(x=>topics.includes(x))) return d;
  return "tools";
}
function callsignFrom(repo){
  const cs=(repo.topics||[]).find(x=>x.indexOf("cs-")===0);
  if(cs) return cs.slice(3).toUpperCase().slice(0,4);
  const s=repo.name.replace(/^yama[-_]?/i,"").replace(/[^a-z0-9]/gi,"");
  return (s||repo.name).slice(0,3).toUpperCase();
}
function discover(){
  const have=new Set(MODULES.map(m=>m.slug.toLowerCase()));
  fetch(`https://api.github.com/users/${OWNER}/repos?per_page=100&sort=updated`,
        {headers:{Accept:"application/vnd.github+json"}})
    .then(r=> r.ok ? r.json() : Promise.reject(r.status))
    .then(all=>{
      const found=(Array.isArray(all)?all:[]).filter(r=>
        !r.private && !r.fork &&
        ((r.topics||[]).includes(FLEET_TOPIC) || /^yama[-_]/i.test(r.name)) &&
        !have.has(r.name.toLowerCase()));
      if(!found.length) return;
      EXTRA=found.map(r=>{
        const d=r.description||"";
        const topics=(r.topics||[]).map(x=>x.toLowerCase());
        return {
          slug:r.name,
          deck:deckFromTopics(topics),
          call:callsignFrom(r),
          status:r.archived?"beta":"online",
          web:!!r.has_pages || !!(r.homepage&&r.homepage.trim()),
          url:(r.homepage&&r.homepage.trim())?r.homepage:(r.has_pages?PAGES(r.name):null),
          desc:{tr:d,de:d,en:d},
          _auto:true
        };
      });
      chrome(); renderDecks();
    })
    .catch(()=>{/* sessiz: küratörlü modüller zaten görünür */});
}

chrome();
renderDecks();
discover();      // arka planda yeni repoları keşfet ve ekle
